<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <form action="/pets/orders" method="post">
        <label>
            Вид животного
            <select name="petType">
                <option value="cat" selected>Кошка</option>
                <option value="dog">Собака</option>
                <option value="tiger">Тигр</option>
            </select>
        </label>
        <label>
            Пол
            <select name="gender">
                <option value="boy" selected>Женский</option>
                <option value="girl">Мужской</option>
                <option value="none">Мужской</option>
            </select>
        </label>
        <label>
            Цвет глаз
            <input type="color" name="eyeColor" value="Голубой">
        </label>
        <label>
            Длина хвоста
            <input type="number" name="tailLength" value=30>
        </label>

        <label>
            Ваше имя
            <input type="text" name="name" value="Полкан" placeholder="Введите имя" required>
        </label>
        <label>
            Дата рождения
            <input type="date" name="dateOfBirth" value="2021-05-17" placeholder="2026-04-14" required>
        </label>
        <label>
            Email
            <input type="email" name="email" value="polkan2006@gmail.com" placeholder="your_email@gmail.com" required>
        </label>
        <label>
            Номер телефона
            <input type="tel" name="phone" value="88005553535" placeholder="+73434563212" required>
        </label>
        <label>
            Правила
            <input type="checkbox" name="rules" value="true" required>
        </label>
        <button type="submit">Submit</button>
        <input type="reset" value="Reset"/>
    </form>

</main>
</body>
</html>
