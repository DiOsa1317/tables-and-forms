<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <form action="/pets/orders" method="post">
        <label>
            Вид животного
            <input type="text" name="petType" value="Кошка">
        </label>
        <label>
            Пол
            <select name="gender">
                <option value="female" selected>Женский</option>
                <option value="male">Мужской</option>
            </select>
        </label>
        <label>
            Цвет глаз
            <input type="text" name="eyeColor" value="Голубой">
        </label>
        <label>
            Длина хвоста
            <input type="number" name="tailLength" value=30>
        </label>
        <button type="submit">Submit</button>
        <input type="reset" value="Reset"/>
    </form>
        <form action="/pets/orders" method="post">
            <label>
                Ваше имя
                <input type="text" name="name" value="Полкан" placeholder="Введите имя" required>
            </label>
            <label>
                Дата рождения
                <input type="date" name="dateOfBirth" value="2021-05-17" placeholder="2026-04-14" required>
            </label>
            <label>
                Email
                <input type="email" name="email" value="polkan2006@gmail.com" placeholder="your_email@gmail.com" required>
            </label>
            <label>
                Номер телефона
                <input type="tel" name="phone" value="88005553535" placeholder="+73434563212" required>
            </label>
            <label>
                Правила
                <input type="textarea" name="rules" value="Покладистый рыжий" placeholder="Напиши пожелания по характеру" required>
            </label>
            <button type="submit">Submit</button>

        </form>

</main>
</body>
</html>
